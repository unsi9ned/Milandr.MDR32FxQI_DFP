name: Build CMSIS Pack

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Pack version (e.g., 1.3.2-unsi9ned.1)'
        required: false
        default: '1.3.2-unsi9ned.2'
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set pack name and version
        id: vars
        shell: pwsh
        run: |
          $PACK_NAME = "Milandr.MDR32FxQI_DFP"
          
          if ("${{ github.event.inputs.version }}" -ne "") {
            $VERSION = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref }}" -match "refs/tags/v(.*)") {
            $VERSION = $matches[1]
          } else {
            $VERSION = "1.3.2-unsi9ned.2"
          }
          
          echo "PACK_NAME=$PACK_NAME" >> $env:GITHUB_ENV
          echo "PACK_VERSION=$VERSION" >> $env:GITHUB_ENV
          echo "OUTPUT_FILE=$PACK_NAME.$VERSION.pack" >> $env:GITHUB_ENV
      
      - name: Display build info
        shell: pwsh
        run: |
          Write-Host "========================================"
          Write-Host "  CMSIS Pack Builder"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "Pack: ${{ env.PACK_NAME }}"
          Write-Host "Version: ${{ env.PACK_VERSION }}"
          Write-Host "Output: ${{ env.OUTPUT_FILE }}"
          Write-Host ""
      
      - name: Verify PDSC file exists
        shell: pwsh
        run: |
          $pdsc = "${{ env.PACK_NAME }}.pdsc"
          if (Test-Path $pdsc) {
            Write-Host "[OK] PDSC file found: $pdsc"
          } else {
            Write-Host "[WARNING] PDSC file not found: $pdsc"
          }
      
      - name: Create temporary directory
        shell: pwsh
        run: |
          $tempDir = Join-Path $env:TEMP "pack_$([System.IO.Path]::GetRandomFileName())"
          New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
          echo "TEMP_DIR=$tempDir" >> $env:GITHUB_ENV
      
      - name: Copy files to temporary directory
        shell: pwsh
        run: |
          $exclude = @('*.bat', '*.pack', '.git*', '.github')
          
          # Копируем файлы
          Get-ChildItem -File | Where-Object { 
            $exclude | Where-Object { $_ -like $_.Name } | Out-Null
            $_.Name -notin $exclude
          } | ForEach-Object {
            Copy-Item $_.FullName -Destination "${{ env.TEMP_DIR }}\" -Force
            Write-Host "  Copied file: $($_.Name)"
          }
          
          # Копируем папки
          Get-ChildItem -Directory | Where-Object {
            $_.Name -ne '.git' -and $_.Name -ne '.github'
          } | ForEach-Object {
            $destDir = Join-Path "${{ env.TEMP_DIR }}" $_.Name
            New-Item -ItemType Directory -Path $destDir -Force | Out-Null
            Copy-Item -Path "$($_.FullName)\*" -Destination $destDir -Recurse -Force
            Write-Host "  Copied directory: $($_.Name)"
          }
          
          # Дополнительно удаляем create_pack.bat если он всё же появился
          Remove-Item -Path "${{ env.TEMP_DIR }}\create_pack.bat" -Force -ErrorAction SilentlyContinue
      
      - name: Install 7-Zip
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install 7zip
      
      - name: Create pack archive
        shell: pwsh
        run: |
          $outputFile = "${{ github.workspace }}\${{ env.OUTPUT_FILE }}"
          Push-Location "${{ env.TEMP_DIR }}"
          7z a -tzip $outputFile * -mx=5 | Out-Null
          Pop-Location
          Write-Host "[OK] Pack created: $outputFile"
      
      - name: Clean up temporary directory
        shell: pwsh
        run: |
          Remove-Item -Path "${{ env.TEMP_DIR }}" -Recurse -Force
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_FILE }}
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 30
      
      - name: Get file size
        shell: pwsh
        run: |
          $file = Get-Item "${{ env.OUTPUT_FILE }}"
          Write-Host "Size: $([math]::Round($file.Length / 1KB, 2)) KB"
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.OUTPUT_FILE }}
          name: "${{ env.PACK_NAME }} ${{ env.PACK_VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true